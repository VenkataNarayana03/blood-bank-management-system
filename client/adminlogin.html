<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login | Blood Bank</title>
  <link rel="stylesheet" href="password-toggle.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #ffe0e0, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h2 {
      margin-bottom: 20px;
      color: #b71c1c;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #b71c1c;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #ffb74d, #e53935);
    }

    #error {
      color: red;
      margin-top: 10px;
    }

    .main-link {
      display: inline-block;
      margin-top: 20px;
      color: #e53935;
      font-weight: bold;
      text-decoration: none;
    }

    .main-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <input type="email" id="email" placeholder="Admin Email" required />
      <div class="password-field">
        <input type="password" id="password" placeholder="Password" required />
        <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
          <svg class="eye-visible" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-hidden" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 5.2A11.4 11.4 0 0 1 12 5c6.5 0 10 7 10 7a16.8 16.8 0 0 1-3.2 3.9"></path>
            <path d="M6.2 6.7C3.5 8.7 2 12 2 12s3.5 7 10 7a10 10 0 0 0 3.2-.5"></path>
          </svg>
        </button>
      </div>
      <button type="submit">Login</button>
      <div id="error"></div>
    </form>
    <a class="main-link" href="index.html">Back to Main Page</a>
  </div>

  <script>
    document.getElementById("adminLoginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("https://blood-bank-management-system-h78a.onrender.com/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          window.location.href = "admindashboard.html"; // Redirect to Admin Dashboard
        } else {
          document.getElementById("error").innerText = data.message || "Login failed";
        }
      } catch (err) {
        document.getElementById("error").innerText = "Something went wrong.";
      }
    });
  </script>
  <script src="js/password-toggle.js"></script>
</body>
</html>
