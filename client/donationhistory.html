<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation History | Donor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 42px 20px;
      background: linear-gradient(to bottom right, #ffe0e0, #ffffff);
      color: #333;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 26px;
    }

    h2 {
      margin: 0;
      color: #b71c1c;
    }

    .back-link {
      padding: 10px 18px;
      border-radius: 7px;
      background: #b71c1c;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
    }

    .back-link:hover {
      background: #d32f2f;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(183, 28, 28, 0.12);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    th {
      background: #b71c1c;
      color: #fff;
    }

    tbody tr:nth-child(even) {
      background: #fff5f5;
    }

    #message {
      margin-top: 22px;
      color: #b71c1c;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <h2>Your Donation History</h2>
      <a class="back-link" href="dashboard.html">Back to Dashboard</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Hospital</th>
            <th>Location</th>
            <th>Blood Group</th>
            <th>Units</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
    <p id="message">Loading donation history...</p>
  </main>

  <script>
    const user = JSON.parse(localStorage.getItem("user"));
    const historyBody = document.getElementById("historyBody");
    const message = document.getElementById("message");

    if (!user || user.role !== "donor") {
      window.location.href = "login.html";
    } else {
      loadDonationHistory();
    }

    async function loadDonationHistory() {
      try {
        const res = await fetch(`https://blood-bank-management-system-h78a.onrender.com/api/donor/history/${encodeURIComponent(user.email)}`);
        if (!res.ok) {
          throw new Error("Failed to load donation history.");
        }

        const donations = await res.json();
        if (!Array.isArray(donations) || donations.length === 0) {
          message.textContent = "No donation history found.";
          return;
        }

        donations.forEach((donation, index) => {
          const row = document.createElement("tr");
          const cells = [
            index + 1,
            new Date(donation.date).toLocaleDateString(),
            donation.hospital,
            donation.location,
            donation.bloodGroup,
            donation.units
          ];

          cells.forEach((value) => {
            const cell = document.createElement("td");
            cell.textContent = value || "-";
            row.appendChild(cell);
          });

          historyBody.appendChild(row);
        });

        message.textContent = "";
      } catch (err) {
        message.textContent = err.message || "Failed to load donation history.";
      }
    }
  </script>
</body>
</html>
