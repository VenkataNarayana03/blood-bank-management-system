<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Blood Bank</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="password-toggle.css" />
  <style>
    

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(229, 57, 53, 0.2);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h2 {
      font-size: 2em;
      margin-bottom: 10px;
      color:#b71c1c;
    }

    .subtitle {
      font-size: 1em;
      color: #666;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1em;
    }

    button {
      background: #b71c1c;
      border: none;
      color: white;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #ffb74d, #e53935);
    }

    .form-link {
      margin-top: 20px;
      font-size: 0.95em;
    }

    .form-link a {
      color: #e53935;
      font-weight: bold;
      text-decoration: none;
    }

    .form-link a:hover {
      text-decoration: underline;
    }

    #loginMessage {
      color: #d50000;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to access your dashboard and manage blood requests or donations.</p>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email Address" required /><br>
      <div class="password-field">
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
          <svg class="eye-visible" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-hidden" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 5.2A11.4 11.4 0 0 1 12 5c6.5 0 10 7 10 7a16.8 16.8 0 0 1-3.2 3.9"></path>
            <path d="M6.2 6.7C3.5 8.7 2 12 2 12s3.5 7 10 7a10 10 0 0 0 3.2-.5"></path>
          </svg>
        </button>
      </div>
      <button type="submit">Login</button>
      <p id="loginMessage"></p>
    </form>

    <p class="form-link">
      Don’t have an account? <a href="register.html">Register here</a>
    </p>
    <p class="form-link">
      <a href="index.html">Back to Main Page</a>
    </p>
  </div>

<script src="js/auth.js"></script>
<script src="js/password-toggle.js"></script>
</body>
</html>
